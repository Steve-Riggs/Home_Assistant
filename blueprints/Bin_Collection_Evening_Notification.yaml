blueprint:
  name: "Waste Collection Reminder - Night Before"
  description: >
    Sends a push notification the evening before waste collection,
    listing the bins that will be collected the next morning.
  domain: automation

  input:
    waste_calendars:
      name: "Waste calendars"
      description: "Choose one or more waste collection calendars"
      selector:
        entity:
          multiple: true
          filter:
            - domain: calendar

    reminder_time:
      name: "Reminder time"
      description: "Time to send the reminder the evening before collection"
      default: "19:00:00"
      selector:
        time: {}

    notify_devices:
      name: "Devices to notify"
      description: "Choose one or more Home Assistant Mobile App devices"
      default: []
      selector:
        device:
          integration: mobile_app
          multiple: true

    ha_notification_id:
      name: "HA notification_id"
      description: "Updates the same HA bell notification instead of stacking"
      default: "waste_collection_reminder"
      selector:
        text: {}

mode: single

variables:
  waste_calendars: !input waste_calendars
  ha_notification_id: !input ha_notification_id

trigger:
  - platform: time
    at: !input reminder_time

action:
  - service: calendar.get_events
    target:
      entity_id: !input waste_calendars
    data:
      start_date_time: "{{ today_at('00:00:00') + timedelta(days=1) }}"
      end_date_time: "{{ today_at('00:00:00') + timedelta(days=2) }}"
    response_variable: bin_events

  - variables:
      tomorrow_date: "{{ (now() + timedelta(days=1)).strftime('%Y-%m-%d') }}"
      tomorrow_bins: >-
        {% set ns = namespace(items=[]) %}
        {% for cal in waste_calendars %}
          {% for event in bin_events[cal].events | default([]) %}
            {% set start_day = (event.start | string)[:10] %}
            {% if start_day == tomorrow_date %}
              {% set ns.items = ns.items + [event.summary] %}
            {% endif %}
          {% endfor %}
        {% endfor %}
        {{ ns.items | unique | list }}
      bin_count: "{{ tomorrow_bins | count }}"
      bin_list: "{{ tomorrow_bins | join(', ') }}"
      notify_message: >-
        {% if bin_count | int == 1 %}
          Put out the {{ bin_list }} tonight — collection is tomorrow morning.
        {% else %}
          Put out these bins tonight — collection is tomorrow morning: {{ bin_list }}.
        {% endif %}

  - condition: template
    value_template: "{{ bin_count | int > 0 }}"

  - service: persistent_notification.create
    data:
      notification_id: "{{ ha_notification_id }}"
      title: "Bin reminder"
      message: "{{ notify_message }}"

  - repeat:
      for_each: !input notify_devices
      sequence:
        - variables:
            svc: "notify.mobile_app_{{ device_attr(repeat.item, 'name') | slugify }}"
        - service: "{{ svc }}"
          continue_on_error: true
          data:
            title: "Bin reminder"
            message: "{{ notify_message }}"
            data:
              tag: "waste-collection-reminder"
              notification_icon: "mdi:trash-can-outline"
              color: "green"
